{% extends "base.html" %}

{% block content %}
<section class="card hero">
    <h1 class="h1">Formulation Generator</h1>
    <p class="sub">Search and score formulations with traceable inputs.</p>
</section>

<section class="card">
    <form method="post" action="/recommend">
        <div class="grid-2">
            <div class="field">
                <label>Odor Type</label>
                <input name="odor_type" type="text" placeholder="e.g., diesel" />
            </div>

            <div class="field">
                <label>Family Type</label>
                <input name="family_type" type="text" placeholder="e.g., herbal" />
            </div>

            <div class="field">
                <label>Tags</label>
                <input name="tags" type="text" placeholder="e.g., pine, glue" />
            </div>

            <div class="field">
                <label>Odor Description</label>
                <input name="odor_description" type="text" placeholder="e.g., sharp herbal glue finish" />
            </div>

            <div class="field">
                <label>Intensity (1–10)</label>
                <input name="intensity_1_10" type="number" min="1" max="10" value="5" />
            </div>

            <div class="field">
                <label>Cannabis Forward</label>
                <input name="cannabis_forward" type="number" min="0" max="10" value="0" />
            </div>

            <div class="field">
                <label>Fruity Forward</label>
                <input name="fruity_forward" type="number" min="0" max="10" value="0" />
            </div>

            <div class="field">
                <label>Dessert Forward</label>
                <input name="dessert_forward" type="number" min="0" max="10" value="0" />
            </div>
        </div>

        <div class="actions" style="margin-top:16px;">
            <button type="submit" class="btn primary">✨ Submit</button>
            <button type="reset" class="btn secondary">Reset</button>
        </div>
    </form>
</section>
{% endblock %}
